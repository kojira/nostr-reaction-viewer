<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nostr Reaction Viewer</title>
  <meta name="description" content="Browse the Nostr posts you have reacted to, with images, profiles, and filters." />
  <link rel="preconnect" href="https://yabu.me" />
  <link rel="stylesheet" href="./assets/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">⚡</span>
      <div class="brand-text">
        <h1>Nostr Reaction Viewer</h1>
        <p>Posts you've reacted to</p>
      </div>
    </div>
    <div class="topbar-actions">
      <div id="user-chip" class="user-chip" hidden>
        <img id="user-avatar" class="avatar" alt="" />
        <span id="user-name" class="user-name">…</span>
      </div>
      <button id="login-btn" class="btn btn-primary" type="button">
        Connect with NIP-07
      </button>
      <button id="logout-btn" class="btn btn-ghost" type="button" hidden>Disconnect</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel">
        <h2 class="panel-title">Relays</h2>
        <label class="toggle">
          <input type="checkbox" id="use-user-relays" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          <span class="toggle-label">Use my relays (NIP-65 / NIP-07)</span>
        </label>
        <ul id="relay-list" class="relay-list"></ul>
      </section>

      <section class="panel">
        <h2 class="panel-title">Date range</h2>
        <label class="field">
          <span>From</span>
          <input type="date" id="date-from" />
        </label>
        <label class="field">
          <span>To</span>
          <input type="date" id="date-to" />
        </label>
      </section>

      <section class="panel">
        <h2 class="panel-title">Images</h2>
        <div class="segmented" role="radiogroup" aria-label="Image filter">
          <button class="seg active" data-image="all" type="button" role="radio" aria-checked="true">All</button>
          <button class="seg" data-image="with" type="button" role="radio" aria-checked="false">With images</button>
          <button class="seg" data-image="without" type="button" role="radio" aria-checked="false">No images</button>
        </div>
      </section>

      <button id="apply-btn" class="btn btn-primary btn-block" type="button">Apply filters</button>
    </aside>

    <section class="content">
      <div id="status" class="status" role="status" aria-live="polite"></div>
      <div id="feed" class="feed"></div>
      <div id="sentinel" class="sentinel"></div>
      <div id="loader" class="loader" hidden>
        <span class="spinner" aria-hidden="true"></span> Loading more…
      </div>
      <div id="end" class="end-marker" hidden>You've reached the end.</div>
    </section>
  </main>

  <div id="lightbox" class="lightbox" hidden>
    <button class="lightbox-close" type="button" aria-label="Close">✕</button>
    <img id="lightbox-img" alt="" />
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
